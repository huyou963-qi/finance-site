name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DEPLOY_USER: root
      DEPLOY_PATH: /opt/finance-site
      DEPLOY_PORT: "22"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # prisma generate / next build 不需要真实数据库，占位即可
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
        run: npm run build

      - name: Pack release tarball
        run: node scripts/deploy-pack.mjs

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: deploy-tarball
          path: deploy.tar.gz
          retention-days: 7

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "::error::GitHub Secret DEPLOY_HOST is empty"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error::GitHub Secret DEPLOY_SSH_KEY is empty"
            exit 1
          fi
          if ! printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "::error::DEPLOY_SSH_KEY must be a full private key (BEGIN ... PRIVATE KEY)"
            exit 1
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H -p "${DEPLOY_PORT}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy tarball to server
        run: scp -P "${DEPLOY_PORT}" deploy.tar.gz "${DEPLOY_USER}@${{ secrets.DEPLOY_HOST }}:${DEPLOY_PATH}/"

      - name: Extract and restart on server
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${{ secrets.DEPLOY_HOST }}" <<EOF
          set -euo pipefail
          # 生产以 CI 推送的 deploy.tar.gz 为准；勿在服务器 git pull（tar 解压会使 git 工作区与真实代码不一致）。
          cd "${DEPLOY_PATH}"
          pm2 stop finance-site || true
          rm -rf .next node_modules
          tar -xzf deploy.tar.gz
          rm -f deploy.tar.gz
          # 幂等落库：先把表 owner 对齐为 DATABASE_URL 用户（修 must be owner），再 schema 迁移。
          # 见 scripts/db-ensure-app-owner.mjs；部署用户为 root，可用 sudo -u postgres psql。
          npm run db:ensure-owner || echo "[deploy] db:ensure-owner 失败，仍尝试 migrate"
          npm run db:migrate || echo "[deploy] db:migrate 失败，schema 未应用，请查日志"
          npm run data:apply -- --skip-migrate || echo "[deploy] data:apply 有失败项，应用仍将重启，请查日志"
          pm2 restart finance-site || pm2 start npm --name finance-site -- run start
          pm2 save
          sleep 5
          curl -fsS -o /dev/null http://127.0.0.1:3000/ || (pm2 logs finance-site --lines 40 --nostream; exit 1)
          # 守卫（fail-hard）：S&P500 未播种会让所有个股页 404（历史事故：Wikipedia 源被墙、seed 静默失败）。
          # 放在健康检查之后：站点已重启不受影响，仅让"空表"显式使部署变红报警，不再被绿灯掩盖。
          npm run equity:assert-seeded
          EOF
